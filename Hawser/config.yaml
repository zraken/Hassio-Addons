name: "Hawser"
version: "0.2.42-1"
slug: hawser
description: "Docker stack deployment and management via a remote API"
url: "https://github.com/finsys/hawser"
startup: services
arch:
  - aarch64
  - amd64
  - armv7
init: false
host_network: false
docker_api: true
# NOTE: watchdog URL must match TLS setting — https:// when enable_tls is true, http:// when false.
# Home Assistant does not support conditional watchdog URLs.
watchdog: https://[HOST]:[PORT:2376]/_hawser/health
ports:
  2376/tcp: 2376
ports_description:
  2376/tcp: "Hawser Docker management API"
map:
  - type: share
    read_only: false
  - type: ssl
    read_only: true
options:
  token: "your-secret-token"
  edge_mode: false
  dockhand_server_url: ""
  enable_tls: false
  certdir: "/ssl"
schema:
  token: str
  edge_mode: bool
  dockhand_server_url: str
  enable_tls: bool
  certdir: str